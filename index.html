<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ride Dispatch — George Schuler</title>
<link rel="icon" type="image/png" sizes="32x32" href="/request_a_ride_option3_32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/request_a_ride_option3_16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/request_a_ride_option3_256.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --indigo: #2825BE;
    --amber: #EB9001;
    --teal: #0C7A7A;
    --terra: #CF4C38;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --bg: #fafaf7;
    --card: #ffffff;
    --border: #e5e5e0;
    --shadow: 0 1px 3px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    max-width: 380px;
    width: 100%;
    box-shadow: var(--shadow);
    text-align: center;
  }

  .login-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .login-card p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

  .login-card input {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    font-family: inherit;
  }

  .login-card button {
    width: 100%;
    padding: 12px;
    background: var(--indigo);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  .login-msg {
    margin-top: 12px;
    font-size: 13px;
    padding: 10px;
    border-radius: 6px;
  }
  .login-msg.success { background: rgba(12,122,122,0.1); color: var(--teal); }
  .login-msg.error { background: rgba(207,76,56,0.1); color: var(--terra); }

  .app { max-width: 900px; margin: 0 auto; padding: 24px 20px 80px; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .brand {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }

  .logout-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
  }

  /* Service status banner (top of dashboard) */
  .service-banner {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: var(--shadow);
  }

  .service-banner.available {
    border-left: 3px solid var(--teal);
  }

  .service-banner.limited {
    border-left: 3px solid var(--amber);
    background: rgba(235,144,1,0.04);
  }

  .service-banner.unavailable {
    border-left: 3px solid var(--terra);
    background: rgba(207,76,56,0.04);
  }

  .service-status-info {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 200px;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot.available { background: var(--teal); }
  .status-dot.limited { background: var(--amber); }
  .status-dot.unavailable { background: var(--terra); }

  .status-text { font-size: 14px; }

  .status-label {
    font-weight: 700;
    color: var(--ink);
    margin-right: 4px;
  }

  .status-message {
    color: var(--muted);
    font-size: 13px;
  }

  .change-status-btn {
    padding: 6px 14px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  .change-status-btn:hover { background: #000; }

  /* Status edit panel (expandable) */
  .status-edit-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }

  .status-edit-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .state-options {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  @media (min-width: 600px) {
    .state-options { grid-template-columns: repeat(3, 1fr); }
  }

  .state-option {
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: #fff;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .state-option:hover { border-color: #c4c2bd; }

  .state-option.selected.available { border-color: var(--teal); background: rgba(12,122,122,0.04); }
  .state-option.selected.limited { border-color: var(--amber); background: rgba(235,144,1,0.04); }
  .state-option.selected.unavailable { border-color: var(--terra); background: rgba(207,76,56,0.04); }

  .state-option-label {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .state-option-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  .status-message-field { margin-bottom: 16px; }

  .status-message-field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .status-message-field textarea {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
    resize: vertical;
    min-height: 60px;
  }

  .status-message-field textarea:focus {
    outline: none;
    border-color: var(--indigo);
    box-shadow: 0 0 0 3px rgba(40,37,190,0.1);
  }

  .status-message-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .status-edit-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .save-status-btn {
    padding: 10px 18px;
    background: var(--indigo);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  .save-status-btn:hover:not(:disabled) { background: #1f1c9e; }
  .save-status-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .cancel-status-btn {
    padding: 10px 18px;
    background: #fff;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  /* Top-level nav */
  .nav-top {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    width: fit-content;
  }

  .nav-top-btn {
    padding: 8px 16px;
    background: transparent;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .nav-top-btn.active { background: var(--indigo); color: #fff; }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .tab {
    padding: 10px 14px;
    background: transparent;
    border: none;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-family: inherit;
    white-space: nowrap;
  }

  .tab.active { color: var(--ink); border-bottom-color: var(--indigo); }

  .tab .count {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 7px;
    background: var(--bg);
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
  }

  .tab.active .count { background: var(--indigo); color: #fff; }
  .tab.has-attention .count { background: var(--amber); color: #fff; }

  .request-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }

  .request-card.attention { border-left: 3px solid var(--amber); }

  .request-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .rider-info { flex: 1; min-width: 200px; }
  .rider-name { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .rider-contact { font-size: 13px; color: var(--muted); }
  .rider-contact a { color: var(--indigo); text-decoration: none; }

  .status-badge {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .status-awaiting_payment { background: rgba(107,107,107,0.15); color: var(--muted); }
  .status-paid_unconfirmed { background: rgba(235,144,1,0.18); color: #8a5400; }
  .status-pending { background: rgba(40,37,190,0.12); color: var(--indigo); }
  .status-approved { background: rgba(12,122,122,0.15); color: var(--teal); }
  .status-rejected { background: rgba(207,76,56,0.12); color: var(--terra); }
  .status-completed { background: rgba(107,107,107,0.1); color: var(--muted); }

  .request-when {
    font-size: 15px;
    font-weight: 600;
    color: var(--indigo);
    margin-bottom: 12px;
  }

  .payment-strip {
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 13px;
  }

  .payment-strip.promo {
    background: rgba(12,122,122,0.06);
    border: 1px solid rgba(12,122,122,0.2);
  }

  .payment-strip.attention {
    background: rgba(235,144,1,0.08);
    border: 1px solid rgba(235,144,1,0.25);
  }

  .reservation-pill {
    background: #fff;
    border: 1px dashed var(--indigo);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'SF Mono', Menlo, monospace;
    font-weight: 700;
    color: var(--indigo);
    font-size: 12px;
  }

  .request-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  @media (min-width: 600px) {
    .request-grid { grid-template-columns: 1fr 1fr; }
  }

  .field-block { font-size: 14px; }

  .field-label {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-bottom: 2px;
    font-weight: 600;
  }

  .field-value { color: var(--ink); line-height: 1.4; word-break: break-word; }
  .field-block.full { grid-column: 1 / -1; }

  .request-meta {
    display: flex;
    gap: 14px;
    font-size: 13px;
    color: var(--muted);
    padding-top: 12px;
    border-top: 1px solid var(--border);
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .meta-item strong { color: var(--ink); font-weight: 600; }

  .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid;
    font-family: inherit;
    transition: all 0.15s;
  }

  .btn-approve { background: var(--teal); color: #fff; border-color: var(--teal); }
  .btn-approve:hover { background: #0a6868; }
  .btn-reject { background: #fff; color: var(--terra); border-color: var(--terra); }
  .btn-reject:hover { background: rgba(207,76,56,0.06); }
  .btn-complete { background: var(--indigo); color: #fff; border-color: var(--indigo); }
  .btn-reopen { background: #fff; color: var(--muted); border-color: var(--border); }
  .btn-copy { background: var(--amber); color: #fff; border-color: var(--amber); }
  .btn-copy:hover { background: #d18001; }
  .btn-secondary { background: #fff; color: var(--ink); border-color: var(--border); }
  .btn-secondary:hover { border-color: var(--muted); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .loading { text-align: center; padding: 40px; color: var(--muted); }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }

  /* Promo management styles */
  .promo-add-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }

  .promo-add-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }

  .promo-add-row {
    display: grid;
    grid-template-columns: 1fr 2fr auto;
    gap: 8px;
  }

  @media (max-width: 600px) {
    .promo-add-row { grid-template-columns: 1fr; }
  }

  .promo-add-row input {
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
  }

  .promo-add-row input:focus {
    outline: none;
    border-color: var(--indigo);
    box-shadow: 0 0 0 3px rgba(40,37,190,0.1);
  }

  #new-code-input {
    text-transform: uppercase;
    font-family: 'SF Mono', Menlo, monospace;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .add-code-btn {
    padding: 10px 18px;
    background: var(--indigo);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }

  .add-code-btn:hover:not(:disabled) { background: #1f1c9e; }
  .add-code-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .promo-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 14px;
    align-items: center;
    box-shadow: var(--shadow);
  }

  .promo-card.inactive { opacity: 0.6; }

  .promo-code-text {
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--indigo);
    letter-spacing: 0.5px;
  }

  .promo-card.inactive .promo-code-text {
    color: var(--muted);
    text-decoration: line-through;
  }

  .promo-description { font-size: 14px; color: var(--ink); word-break: break-word; }
  .promo-description.empty-desc { color: var(--muted); font-style: italic; }

  .promo-usage {
    font-size: 12px;
    color: var(--muted);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 12px;
    white-space: nowrap;
  }

  .promo-usage strong { color: var(--ink); }

  .promo-toggle-btn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    color: var(--muted);
    white-space: nowrap;
  }

  .promo-toggle-btn:hover { border-color: var(--muted); }
  .promo-toggle-btn.retire { color: var(--terra); }
  .promo-toggle-btn.activate { color: var(--teal); }

  .promo-section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin: 20px 0 8px;
  }

  .promo-section-title:first-child { margin-top: 0; }

  @media (max-width: 600px) {
    .promo-card {
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .promo-code-text { grid-column: 1; }
    .promo-usage { grid-column: 2; grid-row: 1; }
    .promo-description { grid-column: 1 / -1; grid-row: 2; }
    .promo-toggle-btn { grid-column: 1 / -1; grid-row: 3; justify-self: start; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <h1>Ride Dispatch</h1>
    <p>Sign in to manage ride requests.</p>
    <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
    <button onclick="sendMagicLink()">Send magic link</button>
    <div id="login-msg" class="login-msg" style="display:none;"></div>
  </div>
</div>

<!-- App -->
<div id="app" class="app" style="display:none;">
  <header>
   <div style="display: flex; align-items: center; gap: 14px;">
    <img src="/request_a_ride_option3_256.png" alt="" style="width: 48px; height: 48px; flex-shrink: 0;">
    <div>
      <div class="brand">George Schuler</div>
      <h1>Ride Dispatch</h1>
    </div>
  </div>
  <button class="logout-btn" onclick="logout()">Sign out</button>
  </header>

  <!-- Service status banner -->
  <div id="service-banner" class="service-banner available">
    <div class="service-status-info">
      <div class="status-dot available" id="status-dot"></div>
      <div class="status-text">
        <span class="status-label" id="status-label">Available</span>
        <span class="status-message" id="status-message"></span>
      </div>
    </div>
    <button class="change-status-btn" id="change-status-btn">Change</button>
  </div>

  <!-- Status edit panel (hidden by default) -->
  <div id="status-edit-panel" class="status-edit-panel" style="display:none;">
    <div class="status-edit-title">Update your availability</div>

    <div class="state-options">
      <button class="state-option" data-state="available">
        <div class="state-option-label">🟢 Available</div>
        <div class="state-option-desc">Form works normally, no banner shown to riders.</div>
      </button>
      <button class="state-option" data-state="limited">
        <div class="state-option-label">🟡 Limited</div>
        <div class="state-option-desc">Form still works but riders see a slowdown warning.</div>
      </button>
      <button class="state-option" data-state="unavailable">
        <div class="state-option-label">🔴 Unavailable</div>
        <div class="state-option-desc">Form is closed. Riders can't submit requests.</div>
      </button>
    </div>

    <div class="status-message-field">
      <label>Message for riders <span class="hint" style="color:var(--muted);font-weight:400;">optional</span></label>
      <textarea id="status-message-input" placeholder="Back Monday at 9am" maxlength="300"></textarea>
      <div class="status-message-hint">Shown to riders alongside the banner or closed-form message. Leave blank for the default.</div>
    </div>

    <div class="status-edit-actions">
      <button class="cancel-status-btn" id="cancel-status-btn">Cancel</button>
      <button class="save-status-btn" id="save-status-btn">Save</button>
    </div>
  </div>

  <!-- Top-level nav -->
  <div class="nav-top">
    <button class="nav-top-btn active" data-view="rides">Rides</button>
    <button class="nav-top-btn" data-view="promo">Promo codes</button>
  </div>

  <div id="rides-view">
    <div class="tabs">
      <button class="tab" data-status="paid_unconfirmed">Verify Payment <span class="count" id="count-paid_unconfirmed">0</span></button>
      <button class="tab" data-status="awaiting_payment">Awaiting Payment <span class="count" id="count-awaiting_payment">0</span></button>
      <button class="tab active" data-status="pending">Ready to Approve <span class="count" id="count-pending">0</span></button>
      <button class="tab" data-status="approved">Approved <span class="count" id="count-approved">0</span></button>
      <button class="tab" data-status="completed">Completed <span class="count" id="count-completed">0</span></button>
      <button class="tab" data-status="rejected">Rejected <span class="count" id="count-rejected">0</span></button>
    </div>

    <div id="requests-container">
      <div class="loading">Loading…</div>
    </div>
  </div>

  <div id="promo-view" style="display:none;">
    <div class="promo-add-card">
      <h2>Create a new code</h2>
      <div class="promo-add-row">
        <input type="text" id="new-code-input" placeholder="CODE" maxlength="40">
        <input type="text" id="new-desc-input" placeholder="Description (who is this for?)" maxlength="200">
        <button class="add-code-btn" id="add-code-btn">Add code</button>
      </div>
    </div>

    <div id="promo-list-container">
      <div class="loading">Loading codes…</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // ============================================================
  // CONFIG
  // ============================================================
  const SUPABASE_URL = 'https://sgummlnkfaalgaftjhek.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNndW1tbG5rZmFhbGdhZnRqaGVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MDA0MDAsImV4cCI6MjA5NDQ3NjQwMH0.ls8Ip-39Mw7rDj6HT_CGLmkEs0D1GT33Nf9DD1ryDfI';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentView = 'rides';
  let currentTab = 'pending';
  let allRequests = [];
  let allPromoCodes = [];
  let currentStatus = { state: 'available', message: null };
  let pendingStatusEdit = null;

  // ============================================================
  // Auth
  // ============================================================
  async function sendMagicLink() {
    const email = document.getElementById('login-email').value.trim();
    const msg = document.getElementById('login-msg');
    if (!email) {
      msg.textContent = 'Please enter your email.';
      msg.className = 'login-msg error';
      msg.style.display = 'block';
      return;
    }
    const { error } = await db.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    if (error) {
      msg.textContent = error.message;
      msg.className = 'login-msg error';
    } else {
      msg.textContent = 'Check your email for the sign-in link.';
      msg.className = 'login-msg success';
    }
    msg.style.display = 'block';
  }

  async function logout() {
    await db.auth.signOut();
    location.reload();
  }

  async function checkAuth() {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      await loadServiceStatus();
      await loadRequests();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  }

  // ============================================================
  // Service status
  // ============================================================
  async function loadServiceStatus() {
    const { data, error } = await db
      .from('service_status')
      .select('state, message')
      .eq('id', 1)
      .maybeSingle();

    if (error || !data) {
      console.error('Could not load service status', error);
      return;
    }

    currentStatus = data;
    renderServiceBanner();
  }

  function renderServiceBanner() {
    const banner = document.getElementById('service-banner');
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-label');
    const message = document.getElementById('status-message');

    // Reset classes
    banner.classList.remove('available', 'limited', 'unavailable');
    dot.classList.remove('available', 'limited', 'unavailable');

    banner.classList.add(currentStatus.state);
    dot.classList.add(currentStatus.state);

    const labels = {
      available: 'Available',
      limited: 'Limited availability',
      unavailable: 'Unavailable'
    };
    label.textContent = labels[currentStatus.state];

    if (currentStatus.message && currentStatus.message.trim()) {
      message.textContent = ' · ' + currentStatus.message;
    } else {
      message.textContent = '';
    }
  }

  document.getElementById('change-status-btn').addEventListener('click', () => {
    const panel = document.getElementById('status-edit-panel');
    const isOpen = panel.style.display !== 'none';

    if (isOpen) {
      panel.style.display = 'none';
      document.getElementById('change-status-btn').textContent = 'Change';
      return;
    }

    // Open with current values
    pendingStatusEdit = { state: currentStatus.state, message: currentStatus.message || '' };
    document.getElementById('status-message-input').value = pendingStatusEdit.message;
    document.querySelectorAll('.state-option').forEach(opt => {
      opt.classList.remove('selected', 'available', 'limited', 'unavailable');
      if (opt.dataset.state === pendingStatusEdit.state) {
        opt.classList.add('selected', pendingStatusEdit.state);
      }
    });
    panel.style.display = 'block';
    document.getElementById('change-status-btn').textContent = 'Close';
  });

  document.querySelectorAll('.state-option').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.state-option').forEach(o => {
        o.classList.remove('selected', 'available', 'limited', 'unavailable');
      });
      const newState = opt.dataset.state;
      opt.classList.add('selected', newState);
      if (pendingStatusEdit) {
        pendingStatusEdit.state = newState;
      }
    });
  });

  document.getElementById('cancel-status-btn').addEventListener('click', () => {
    document.getElementById('status-edit-panel').style.display = 'none';
    document.getElementById('change-status-btn').textContent = 'Change';
    pendingStatusEdit = null;
  });

  document.getElementById('save-status-btn').addEventListener('click', async () => {
    if (!pendingStatusEdit) return;

    const btn = document.getElementById('save-status-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const message = document.getElementById('status-message-input').value.trim() || null;

    const { error } = await db
      .from('service_status')
      .update({
        state: pendingStatusEdit.state,
        message: message,
        updated_at: new Date().toISOString()
      })
      .eq('id', 1);

    btn.disabled = false;
    btn.textContent = 'Save';

    if (error) {
      showToast('Error: ' + error.message);
      return;
    }

    currentStatus = { state: pendingStatusEdit.state, message: message };
    renderServiceBanner();
    document.getElementById('status-edit-panel').style.display = 'none';
    document.getElementById('change-status-btn').textContent = 'Change';
    pendingStatusEdit = null;
    showToast('Status updated');
  });

  // ============================================================
  // Top-level nav
  // ============================================================
  document.querySelectorAll('.nav-top-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      document.querySelectorAll('.nav-top-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;

      if (currentView === 'rides') {
        document.getElementById('rides-view').style.display = 'block';
        document.getElementById('promo-view').style.display = 'none';
        await loadRequests();
      } else {
        document.getElementById('rides-view').style.display = 'none';
        document.getElementById('promo-view').style.display = 'block';
        await loadPromoCodes();
      }
    });
  });

  // ============================================================
  // Rides
  // ============================================================
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.status;
      renderRequests();
    });
  });

  async function loadRequests() {
    const { data, error } = await db
      .from('ride_requests')
      .select('*')
      .order('ride_datetime', { ascending: true });

    if (error) {
      document.getElementById('requests-container').innerHTML =
        `<div class="empty">Error loading: ${error.message}</div>`;
      return;
    }

    allRequests = data || [];
    updateCounts();
    renderRequests();
  }

  function updateCounts() {
    const counts = {
      awaiting_payment: 0, paid_unconfirmed: 0, pending: 0,
      approved: 0, completed: 0, rejected: 0
    };
    allRequests.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });
    Object.keys(counts).forEach(k => {
      const el = document.getElementById('count-' + k);
      if (el) el.textContent = counts[k];
    });

    const paidTab = document.querySelector('[data-status="paid_unconfirmed"]');
    if (paidTab) paidTab.classList.toggle('has-attention', counts.paid_unconfirmed > 0);
    const pendingTab = document.querySelector('[data-status="pending"]');
    if (pendingTab) pendingTab.classList.toggle('has-attention', counts.pending > 0);
  }

  function renderRequests() {
    const container = document.getElementById('requests-container');
    const filtered = allRequests.filter(r => r.status === currentTab);

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty">No requests in this state.</div>`;
      return;
    }

    if (currentTab === 'awaiting_payment' || currentTab === 'paid_unconfirmed' || currentTab === 'pending') {
      filtered.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    } else {
      filtered.sort((a, b) => new Date(a.ride_datetime) - new Date(b.ride_datetime));
    }

    container.innerHTML = filtered.map(r => renderCard(r)).join('');
    attachActionListeners();
  }

  function fmtDateTime(iso) {
    const d = new Date(iso);
    return d.toLocaleString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit'
    });
  }

  function fmtRelative(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diffMin = (d - now) / 1000 / 60;
    const absMin = Math.abs(diffMin);
    if (absMin < 5) return diffMin < 0 ? 'just now' : 'any moment';
    if (absMin < 60) return diffMin < 0 ? `${Math.round(absMin)}m ago` : `in ${Math.round(absMin)}m`;
    if (absMin < 1440) return diffMin < 0 ? `${Math.round(absMin / 60)}h ago` : `in ${Math.round(absMin / 60)}h`;
    return diffMin < 0 ? `${Math.round(absMin / 1440)}d ago` : `in ${Math.round(absMin / 1440)}d`;
  }

  function tierLabel(tier) {
    return {
      'under_30': 'Under 30 min',
      '30_to_60': '30 min – 1 hr',
      '60_to_120': '1 – 2 hrs'
    }[tier] || tier;
  }

  function statusLabel(s) {
    return {
      'awaiting_payment': 'awaiting payment',
      'paid_unconfirmed': 'rider says paid',
      'pending': 'ready to approve',
      'approved': 'approved',
      'completed': 'completed',
      'rejected': 'rejected'
    }[s] || s;
  }

  function contactLink(contact, type) {
    if (type === 'phone') {
      const clean = contact.replace(/[^0-9+]/g, '');
      return `<a href="tel:${clean}">${contact}</a> · <a href="sms:${clean}">text</a>`;
    } else {
      return `<a href="mailto:${contact}">${contact}</a>`;
    }
  }

  function renderPaymentStrip(r) {
    if (r.promo_code_used) {
      return `
        <div class="payment-strip promo">
          <div><strong>Promo code:</strong> <span style="font-family:'SF Mono',Menlo,monospace;font-weight:700;color:var(--teal);">${escapeHtml(r.promo_code_used)}</span> — free ride</div>
          ${r.reservation_id ? `<span class="reservation-pill">${escapeHtml(r.reservation_id)}</span>` : ''}
        </div>
      `;
    }

    const needsAttention = r.status === 'paid_unconfirmed';
    const paidNote = r.rider_claims_paid
      ? `<span style="color:var(--teal);font-weight:600;">✓ Rider says paid${r.paid_at ? ' ' + fmtRelative(r.paid_at) : ''}</span>`
      : `<span style="color:var(--muted);">Awaiting payment</span>`;

    return `
      <div class="payment-strip ${needsAttention ? 'attention' : ''}">
        <div><strong>$${r.estimated_fee}</strong> · ${paidNote}</div>
        ${r.reservation_id ? `<span class="reservation-pill">${escapeHtml(r.reservation_id)}</span>` : ''}
      </div>
    `;
  }

  function renderCard(r) {
    const isAttention = r.status === 'paid_unconfirmed';
    return `
      <div class="request-card ${isAttention ? 'attention' : ''}" data-id="${r.id}">
        <div class="request-header">
          <div class="rider-info">
            <div class="rider-name">${escapeHtml(r.rider_name)}</div>
            <div class="rider-contact">${contactLink(escapeHtml(r.rider_contact), r.contact_type)}</div>
          </div>
          <span class="status-badge status-${r.status}">${statusLabel(r.status)}</span>
        </div>

        <div class="request-when">${fmtDateTime(r.ride_datetime)} <span style="color:var(--muted);font-weight:400;">· ${fmtRelative(r.ride_datetime)}</span></div>

        ${renderPaymentStrip(r)}

        <div class="request-grid">
          <div class="field-block">
            <div class="field-label">Pickup</div>
            <div class="field-value">${escapeHtml(r.pickup_address)}</div>
          </div>
          <div class="field-block">
            <div class="field-label">Drop-off</div>
            <div class="field-value">${escapeHtml(r.dropoff_address)}</div>
          </div>
          ${r.stops ? `<div class="field-block full"><div class="field-label">Stops</div><div class="field-value" style="white-space:pre-line">${escapeHtml(r.stops)}</div></div>` : ''}
          ${r.reason ? `<div class="field-block"><div class="field-label">Reason</div><div class="field-value">${escapeHtml(r.reason)}</div></div>` : ''}
          ${r.notes ? `<div class="field-block full"><div class="field-label">Notes</div><div class="field-value">${escapeHtml(r.notes)}</div></div>` : ''}
        </div>

        <div class="request-meta">
          <div class="meta-item"><strong>${tierLabel(r.duration_tier)}</strong></div>
          <div class="meta-item">Submitted ${new Date(r.created_at).toLocaleDateString()}</div>
          ${r.policy_acknowledged ? `<div class="meta-item" title="Rider checked the terms box">✓ Policy ack</div>` : ''}
        </div>

        <div class="actions">
          ${renderActions(r)}
          <button class="btn btn-copy" data-action="copy" data-id="${r.id}">Copy for calendar</button>
        </div>
      </div>
    `;
  }

  function renderActions(r) {
    if (r.status === 'awaiting_payment') {
      return `
        <button class="btn btn-secondary" data-action="mark_paid" data-id="${r.id}">Mark paid (manually)</button>
        <button class="btn btn-reject" data-action="reject" data-id="${r.id}">Cancel</button>
      `;
    }
    if (r.status === 'paid_unconfirmed') {
      return `
        <button class="btn btn-approve" data-action="approve" data-id="${r.id}">Verify & approve</button>
        <button class="btn btn-reject" data-action="reject" data-id="${r.id}">Reject</button>
      `;
    }
    if (r.status === 'pending') {
      return `
        <button class="btn btn-approve" data-action="approve" data-id="${r.id}">Approve</button>
        <button class="btn btn-reject" data-action="reject" data-id="${r.id}">Reject</button>
      `;
    }
    if (r.status === 'approved') {
      return `<button class="btn btn-complete" data-action="complete" data-id="${r.id}">Mark complete</button>`;
    }
    return `<button class="btn btn-reopen" data-action="reopen" data-id="${r.id}">Move back to pending</button>`;
  }

  function attachActionListeners() {
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        if (action === 'copy') copyDetails(id);
        else if (action === 'approve') updateStatus(id, 'approved');
        else if (action === 'reject') updateStatus(id, 'rejected');
        else if (action === 'complete') updateStatus(id, 'completed');
        else if (action === 'reopen') updateStatus(id, 'pending');
        else if (action === 'mark_paid') updateStatus(id, 'paid_unconfirmed', { rider_claims_paid: true, paid_at: new Date().toISOString() });
      });
    });
  }

  async function updateStatus(id, newStatus, extraFields = {}) {
    const update = { status: newStatus, decided_at: new Date().toISOString(), ...extraFields };
    const { error } = await db.from('ride_requests').update(update).eq('id', id);
    if (error) { showToast('Error: ' + error.message); return; }
    showToast(`Marked as ${statusLabel(newStatus)}`);
    await loadRequests();
  }

  function copyDetails(id) {
    const r = allRequests.find(x => x.id === id);
    if (!r) return;
    const when = fmtDateTime(r.ride_datetime);
    const reservation = r.reservation_id || '—';
    const paymentLine = r.promo_code_used
      ? `Promo: ${r.promo_code_used} (FREE)`
      : `Fee: $${r.estimated_fee}${r.rider_claims_paid ? ' (paid)' : ''}`;
    const text = `Ride: ${r.rider_name} [${reservation}]
When: ${when}
Pickup: ${r.pickup_address}
Drop-off: ${r.dropoff_address}${r.stops ? '\nStops: ' + r.stops : ''}${r.reason ? '\nReason: ' + r.reason : ''}
Contact: ${r.rider_contact}
Duration: ${tierLabel(r.duration_tier)} · ${paymentLine}${r.notes ? '\nNotes: ' + r.notes : ''}`;
    navigator.clipboard.writeText(text).then(() => {
      showToast('Copied — paste into Google Calendar');
    });
  }

  // ============================================================
  // Promo codes
  // ============================================================
  async function loadPromoCodes() {
    const container = document.getElementById('promo-list-container');
    container.innerHTML = `<div class="loading">Loading codes…</div>`;

    const { data: codes, error: codesError } = await db
      .from('promo_codes')
      .select('*')
      .order('is_active', { ascending: false })
      .order('created_at', { ascending: false });

    if (codesError) {
      container.innerHTML = `<div class="empty">Error loading codes: ${codesError.message}</div>`;
      return;
    }

    const { data: rides } = await db
      .from('ride_requests')
      .select('promo_code_used')
      .not('promo_code_used', 'is', null);

    const usage = {};
    (rides || []).forEach(r => {
      if (r.promo_code_used) {
        usage[r.promo_code_used] = (usage[r.promo_code_used] || 0) + 1;
      }
    });

    allPromoCodes = (codes || []).map(c => ({ ...c, usage_count: usage[c.code] || 0 }));
    renderPromoCodes();
  }

  function renderPromoCodes() {
    const container = document.getElementById('promo-list-container');

    if (allPromoCodes.length === 0) {
      container.innerHTML = `<div class="empty">No codes yet. Create one above to get started.</div>`;
      return;
    }

    const active = allPromoCodes.filter(c => c.is_active);
    const retired = allPromoCodes.filter(c => !c.is_active);

    let html = '';
    if (active.length > 0) {
      html += `<div class="promo-section-title">Active (${active.length})</div>`;
      html += active.map(renderPromoCard).join('');
    }
    if (retired.length > 0) {
      html += `<div class="promo-section-title">Retired (${retired.length})</div>`;
      html += retired.map(renderPromoCard).join('');
    }

    container.innerHTML = html;
    attachPromoListeners();
  }

  function renderPromoCard(code) {
    const usageText = code.usage_count === 0
      ? 'Unused'
      : `<strong>${code.usage_count}</strong> ${code.usage_count === 1 ? 'use' : 'uses'}`;

    const toggleLabel = code.is_active ? 'Retire' : 'Reactivate';
    const toggleClass = code.is_active ? 'retire' : 'activate';

    return `
      <div class="promo-card ${code.is_active ? '' : 'inactive'}" data-code="${escapeHtml(code.code)}">
        <div class="promo-code-text">${escapeHtml(code.code)}</div>
        <div class="promo-description ${!code.description ? 'empty-desc' : ''}">${code.description ? escapeHtml(code.description) : 'No description'}</div>
        <div class="promo-usage">${usageText}</div>
        <button class="promo-toggle-btn ${toggleClass}" data-promo-action="toggle" data-code="${escapeHtml(code.code)}">${toggleLabel}</button>
      </div>
    `;
  }

  function attachPromoListeners() {
    document.querySelectorAll('[data-promo-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const code = btn.dataset.code;
        togglePromoCode(code);
      });
    });
  }

  async function togglePromoCode(code) {
    const current = allPromoCodes.find(c => c.code === code);
    if (!current) return;
    const newState = !current.is_active;
    const { error } = await db.from('promo_codes').update({ is_active: newState }).eq('code', code);
    if (error) { showToast('Error: ' + error.message); return; }
    showToast(newState ? `${code} reactivated` : `${code} retired`);
    await loadPromoCodes();
  }

  document.getElementById('add-code-btn').addEventListener('click', async () => {
    const codeInput = document.getElementById('new-code-input');
    const descInput = document.getElementById('new-desc-input');
    const btn = document.getElementById('add-code-btn');

    const code = codeInput.value.trim().toUpperCase();
    const description = descInput.value.trim() || null;

    if (!code) { showToast('Please enter a code.'); return; }
    if (!/^[A-Z0-9_-]+$/.test(code)) {
      showToast('Code can only contain letters, numbers, hyphens, and underscores.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Adding…';

    const { error } = await db
      .from('promo_codes')
      .insert({ code, description, is_active: true });

    btn.disabled = false;
    btn.textContent = 'Add code';

    if (error) {
      if (error.code === '23505') {
        showToast(`Code "${code}" already exists.`);
      } else {
        showToast('Error: ' + error.message);
      }
      return;
    }

    codeInput.value = '';
    descInput.value = '';
    showToast(`${code} added`);
    await loadPromoCodes();
  });

  document.getElementById('new-code-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('new-desc-input').focus();
    }
  });

  document.getElementById('new-desc-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('add-code-btn').click();
    }
  });

  document.getElementById('new-code-input').addEventListener('input', (e) => {
    e.target.value = e.target.value.toUpperCase();
  });

  // ============================================================
  // Utils
  // ============================================================
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  db.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') {
      checkAuth();
    }
  });

  checkAuth();
</script>

</body>
</html>
