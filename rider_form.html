<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Request a Ride — George Schuler</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ============================================================
     CONFIG — Replace these two values after creating Supabase project
     ============================================================ */
  /* Supabase URL and anon key are set in the script tag below */

  :root {
    --indigo: #2825BE;
    --amber: #EB9001;
    --teal: #0C7A7A;
    --terra: #CF4C38;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --bg: #fafaf7;
    --card: #ffffff;
    --border: #e5e5e0;
    --shadow: 0 1px 3px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  header {
    margin-bottom: 28px;
  }

  .brand {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 15px;
    color: var(--muted);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }

  .field {
    margin-bottom: 18px;
  }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .hint {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 6px;
  }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="datetime-local"],
  textarea,
  select {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px; /* 16px prevents iOS zoom */
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
    transition: border-color 0.15s;
  }

  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--indigo);
    box-shadow: 0 0 0 3px rgba(40,37,190,0.1);
  }

  textarea {
    resize: vertical;
    min-height: 70px;
  }

  /* Tier buttons */
  .tiers {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .tier-btn {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: #fff;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    width: 100%;
  }

  .tier-btn:hover {
    border-color: #c4c2bd;
  }

  .tier-btn.selected {
    border-color: var(--indigo);
    background: rgba(40,37,190,0.04);
  }

  .tier-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }

  .tier-fee {
    font-size: 15px;
    font-weight: 700;
    color: var(--indigo);
  }

  .tier-btn.selected .tier-fee {
    color: var(--indigo);
  }

  /* Contact type toggle */
  .toggle-group {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .toggle-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .toggle-btn.selected {
    border-color: var(--indigo);
    background: var(--indigo);
    color: #fff;
  }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 16px;
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    color: #fff;
    background: var(--indigo);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }

  .submit-btn:hover:not(:disabled) {
    background: #1f1c9e;
  }

  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Reason chips */
  .chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .chip {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: #fff;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    color: var(--muted);
    transition: all 0.15s;
  }

  .chip.selected {
    border-color: var(--indigo);
    background: var(--indigo);
    color: #fff;
  }

  /* Success state */
  .success-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .success-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 16px;
    background: rgba(12,122,122,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--teal);
  }

  .success-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .success-text {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 20px;
  }

  .new-request-btn {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    cursor: pointer;
  }

  .error {
    background: rgba(207,76,56,0.08);
    border: 1px solid rgba(207,76,56,0.2);
    color: var(--terra);
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
  }

  .footer-note {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 16px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="brand">George Schuler</div>
    <h1>Request a ride</h1>
    <p class="subtitle">Submit your details and George will confirm.</p>
  </header>

  <div id="error-box" class="error" style="display:none;"></div>

  <div id="form-view">
    <form id="ride-form">

      <!-- Who -->
      <div class="card">
        <div class="field">
          <label>Your name</label>
          <input type="text" id="rider_name" required autocomplete="name" placeholder="First and last">
        </div>

        <div class="field">
          <label>Best way to reach you</label>
          <div class="toggle-group">
            <button type="button" class="toggle-btn selected" data-contact="phone">Phone</button>
            <button type="button" class="toggle-btn" data-contact="email">Email</button>
          </div>
          <input type="tel" id="rider_contact" required autocomplete="tel" placeholder="(555) 555-5555">
        </div>
      </div>

      <!-- When + Where -->
      <div class="card">
        <div class="field">
          <label>When do you need the ride?</label>
          <input type="datetime-local" id="ride_datetime" required>
        </div>

        <div class="field">
          <label>Pickup address</label>
          <input type="text" id="pickup_address" required placeholder="Street, city">
        </div>

        <div class="field">
          <label>Drop-off address</label>
          <input type="text" id="dropoff_address" required placeholder="Street, city">
        </div>

        <div class="field">
          <label>Any stops along the way? <span class="hint">optional</span></label>
          <textarea id="stops" placeholder="One per line if multiple"></textarea>
        </div>
      </div>

      <!-- Why + Duration -->
      <div class="card">
        <div class="field">
          <label>Reason for the trip <span class="hint">optional</span></label>
          <div class="chips">
            <button type="button" class="chip" data-reason="Personal">Personal</button>
            <button type="button" class="chip" data-reason="Work">Work</button>
            <button type="button" class="chip" data-reason="Medical">Medical</button>
            <button type="button" class="chip" data-reason="Airport">Airport</button>
          </div>
          <input type="text" id="reason_custom" style="margin-top:8px;" placeholder="Or type something else">
        </div>

        <div class="field">
          <label>How long do you need George?</label>
          <div class="tiers">
            <button type="button" class="tier-btn" data-tier="under_30" data-fee="15">
              <span class="tier-label">Under 30 minutes</span>
              <span class="tier-fee">$15</span>
            </button>
            <button type="button" class="tier-btn" data-tier="30_to_60" data-fee="30">
              <span class="tier-label">30 minutes to 1 hour</span>
              <span class="tier-fee">$30</span>
            </button>
            <button type="button" class="tier-btn" data-tier="60_to_120" data-fee="55">
              <span class="tier-label">1 to 2 hours</span>
              <span class="tier-fee">$55</span>
            </button>
          </div>
        </div>

        <div class="field">
          <label>Anything else George should know? <span class="hint">optional</span></label>
          <textarea id="notes" placeholder="Mobility needs, pets, special requests…"></textarea>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Submit request</button>
      <p class="footer-note">George will text or email you to confirm. This is a service fee to recoup time and gas — not a commercial ride service.</p>

    </form>
  </div>

  <div id="success-view" style="display:none;">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <h2 class="success-title">Request submitted</h2>
      <p class="success-text">George will be in touch shortly to confirm your ride.</p>
      <button class="new-request-btn" onclick="resetForm()">Submit another request</button>
    </div>
  </div>

</div>

<script>
  // ============================================================
  // CONFIG — Replace with your Supabase project values
  // ============================================================
  const SUPABASE_URL = 'https://sgummlnkfaalgaftjhek.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNndW1tbG5rZmFhbGdhZnRqaGVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MDA0MDAsImV4cCI6MjA5NDQ3NjQwMH0.ls8Ip-39Mw7rDj6HT_CGLmkEs0D1GT33Nf9DD1ryDfI';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // State
  let contactType = 'phone';
  let selectedTier = null;
  let selectedFee = null;
  let selectedReason = null;

  // Contact type toggle
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      contactType = btn.dataset.contact;
      const input = document.getElementById('rider_contact');
      if (contactType === 'phone') {
        input.type = 'tel';
        input.placeholder = '(555) 555-5555';
        input.autocomplete = 'tel';
      } else {
        input.type = 'email';
        input.placeholder = 'you@example.com';
        input.autocomplete = 'email';
      }
    });
  });

  // Tier selection
  document.querySelectorAll('.tier-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTier = btn.dataset.tier;
      selectedFee = parseFloat(btn.dataset.fee);
    });
  });

  // Reason chips
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const wasSelected = chip.classList.contains('selected');
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      if (!wasSelected) {
        chip.classList.add('selected');
        selectedReason = chip.dataset.reason;
        document.getElementById('reason_custom').value = '';
      } else {
        selectedReason = null;
      }
    });
  });

  // Custom reason clears chips
  document.getElementById('reason_custom').addEventListener('input', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    selectedReason = null;
  });

  // Min datetime = now + 1 hour
  function setMinDateTime() {
    const now = new Date();
    now.setHours(now.getHours() + 1);
    now.setMinutes(0);
    const iso = now.toISOString().slice(0, 16);
    document.getElementById('ride_datetime').min = iso;
  }
  setMinDateTime();

  // Submit
  document.getElementById('ride-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('error-box');
    errorBox.style.display = 'none';

    if (!selectedTier) {
      errorBox.textContent = 'Please choose how long you need George.';
      errorBox.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }

    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting…';

    const customReason = document.getElementById('reason_custom').value.trim();
    const finalReason = customReason || selectedReason || null;

    const payload = {
      rider_name: document.getElementById('rider_name').value.trim(),
      rider_contact: document.getElementById('rider_contact').value.trim(),
      contact_type: contactType,
      ride_datetime: new Date(document.getElementById('ride_datetime').value).toISOString(),
      pickup_address: document.getElementById('pickup_address').value.trim(),
      dropoff_address: document.getElementById('dropoff_address').value.trim(),
      stops: document.getElementById('stops').value.trim() || null,
      reason: finalReason,
      notes: document.getElementById('notes').value.trim() || null,
      duration_tier: selectedTier,
      estimated_fee: selectedFee
    };

    const { error } = await db.from('ride_requests').insert(payload);

    if (error) {
      console.error(error);
      errorBox.textContent = 'Something went wrong. Please try again or text George directly.';
      errorBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit request';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }

    document.getElementById('form-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  function resetForm() {
    document.getElementById('ride-form').reset();
    document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    selectedTier = null;
    selectedFee = null;
    selectedReason = null;
    document.getElementById('success-view').style.display = 'none';
    document.getElementById('form-view').style.display = 'block';
    setMinDateTime();
  }
</script>

</body>
</html>
